<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ECharts 动态图表示例</title>
    <!-- 1. 引入ECharts库（CDN方式，无需下载） -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <style>
        /* 2. 给图表容器设置宽高 */
        #barChart {
            width: 600px;
            height: 400px;
            margin: 20px;
        }
        #pieChart {
            width: 600px;
            height: 400px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <!-- 3. 创建图表容器 -->
    <div id="barChart"></div>
    <div id="pieChart"></div>

    <script>
        // 4. 初始化柱状图
        const barChart = echarts.init(document.getElementById('barChart'));
        // 柱状图配置项
        barChart.setOption({
            title: { text: '动态柱状图示例' },
            // X轴配置
            xAxis: {
                type: 'category',
                data: ['一月', '二月', '三月', '四月', '五月']
            },
            // Y轴配置
            yAxis: { type: 'value' },
            // 数据系列
            series: [{
                name: '销售额',
                type: 'bar', // 柱状图类型
                data: [120, 250, 150, 80, 210],
                // 开启动画效果（动态加载）
                animationDuration: 1500,
                animationEasing: 'cubicOut'
            }],
            // 网格样式优化
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true }
        });

        // 5. 初始化饼图（圆形分布图）
        const pieChart = echarts.init(document.getElementById('pieChart'));
        // 饼图配置项
        pieChart.setOption({
            title: { text: '动态饼图示例' },
            series: [{
                name: '用户占比',
                type: 'pie', // 饼图类型
                radius: '60%', // 饼图大小
                data: [
                    { value: 335, name: '水' },
                    { value: 310, name: '阳光' },
                    { value: 234, name: '温度' },
                    { value: 135, name: '纬度' },
                    { value: 1548, name: '搜索引擎' }
                ],
                // 饼图动画
                animationDuration: 1500,
                animationEasing: 'elasticOut'
            }]
        });

        // 窗口大小变化时，图表自适应
        window.addEventListener('resize', () => {
            barChart.resize();
            pieChart.resize();
        });
    </script>
</body>
</html>
